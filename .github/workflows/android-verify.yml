name: Verify Android App

on:
  push:
    branches:
      - future/1784566876/AndroidApp
  pull_request:
    branches:
      - future/1784534225/AccountManager
      - main

permissions:
  contents: read

concurrency:
  group: android-verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  debug-build:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build web assets and sync Android
        run: npm run sync:android

      - name: Build Debug APK
        working-directory: android
        run: gradle assembleDebug

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: WangZheAccountManager-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
