name: Verify Account Manager

on:
  push:
    branches:
      - 'future/**'
  pull_request:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Apply pending maintenance, install and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: future/1784534225/AccountManager
          token: ${{ secrets.REPAIR_PAT }}
          fetch-depth: 0

      - name: Apply pending PAT test and layout maintenance
        shell: bash
        run: |
          if [ ! -f .github/workflows/apply-pat-test-layout.yml ]; then
            echo 'No pending maintenance file; continuing with verification.'
            exit 0
          fi

          python - <<'PY'
          from pathlib import Path

          backup_path = Path('src/components/BackupCenter.vue')
          text = backup_path.read_text(encoding='utf-8')

          if 'const testingPat = ref(false)' not in text:
              text = text.replace(
                  "const busy = ref(false)\n",
                  "const busy = ref(false)\nconst testingPat = ref(false)\n",
                  1,
              )

          if 'async function testPat()' not in text:
              marker = """  return { owner, repository, branch, rootDirectory }\n}\n\nfunction encodePath(path) {\n"""
              insertion = """  return { owner, repository, branch, rootDirectory }\n}\n\nasync function githubApiRequest(path, token) {\n  const response = await fetch(`https://api.github.com${path}`, {\n    headers: {\n      Accept: 'application/vnd.github+json',\n      Authorization: `Bearer ${token}`,\n      'X-GitHub-Api-Version': '2022-11-28',\n    },\n  })\n  const payload = await response.json().catch(() => ({}))\n  if (!response.ok) {\n    const detail = payload.message ? `：${payload.message}` : ''\n    throw new Error(`GitHub 检查失败（HTTP ${response.status}）${detail}`)\n  }\n  return payload\n}\n\nasync function testPat() {\n  resetNotice()\n  testingPat.value = true\n\n  try {\n    const target = validateConfig()\n    const token = pat.value.trim()\n    const repositoryPath = `/repos/${encodeURIComponent(target.owner)}/${encodeURIComponent(target.repository)}`\n    const branchPath = `${repositoryPath}/branches/${encodeURIComponent(target.branch)}`\n    const directoryPath = `${repositoryPath}/contents/${encodePath(target.rootDirectory)}?ref=${encodeURIComponent(target.branch)}`\n\n    const [repositoryInfo, branchInfo, directoryInfo] = await Promise.all([\n      githubApiRequest(repositoryPath, token),\n      githubApiRequest(branchPath, token),\n      githubApiRequest(directoryPath, token),\n    ])\n\n    const canWrite = Boolean(repositoryInfo.permissions?.push || repositoryInfo.permissions?.admin)\n    if (!canWrite) {\n      throw new Error('PAT 已通过仓库、分支和目录读取测试，但 GitHub 未报告写入权限。请为该仓库授予 Contents: Read and write。')\n    }\n\n    const itemCount = Array.isArray(directoryInfo) ? directoryInfo.length : 1\n    setNotice(\n      'success',\n      `PAT 测试通过：仓库可访问；分支 ${branchInfo.name || target.branch} 存在；目录 ${target.rootDirectory} 可读取（${itemCount} 项）；仓库写入权限可用。`,\n      backupDirectoryUrl.value,\n    )\n  } catch (error) {\n    setNotice('error', error.message || 'PAT 测试失败。')\n  } finally {\n    testingPat.value = false\n  }\n}\n\nfunction encodePath(path) {\n"""
              if marker not in text:
                  raise SystemExit('BackupCenter insertion marker not found')
              text = text.replace(marker, insertion, 1)

          old_actions = """        <div class=\"backup-action-row end\">\n          <button class=\"button primary\" type=\"button\" :disabled=\"busy\" @click=\"backupToGitHub\">\n            {{ busy ? '正在备份…' : '立即备份到 GitHub' }}\n          </button>\n        </div>\n"""
          new_actions = """        <div class=\"backup-action-row end\">\n          <button\n            class=\"button secondary\"\n            type=\"button\"\n            :disabled=\"busy || testingPat\"\n            @click=\"testPat\"\n          >\n            {{ testingPat ? '正在测试…' : '测试 PAT 与目标配置' }}\n          </button>\n          <button\n            class=\"button primary\"\n            type=\"button\"\n            :disabled=\"busy || testingPat\"\n            @click=\"backupToGitHub\"\n          >\n            {{ busy ? '正在备份…' : '立即备份到 GitHub' }}\n          </button>\n        </div>\n"""
          if '测试 PAT 与目标配置' not in text:
              if old_actions not in text:
                  raise SystemExit('BackupCenter action marker not found')
              text = text.replace(old_actions, new_actions, 1)
          backup_path.write_text(text, encoding='utf-8')

          layout = r''':root {
  --app-max-width: 1180px;
}

html,
body,
#app {
  width: 100%;
  height: 100%;
  min-height: 0;
  overflow: hidden;
  overscroll-behavior: none;
}

body {
  position: fixed;
  inset: 0;
}

.app-shell {
  width: min(var(--app-max-width), 100%);
  height: 100dvh;
  min-height: 0;
  margin: 0 auto;
  padding: 0;
  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  overflow: hidden;
  overscroll-behavior: none;
  background:
    radial-gradient(circle at 12% 0%, rgba(79, 116, 205, 0.16), transparent 28rem),
    linear-gradient(180deg, #f5f7fb 0%, #e9eef6 100%);
}

.app-header {
  position: relative;
  z-index: 10;
  margin: 0;
  padding: calc(12px + env(safe-area-inset-top)) 18px 12px;
  border-width: 0 0 1px;
  border-radius: 0;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 10px 26px rgba(39, 56, 93, 0.08);
  overscroll-behavior: none;
}

.app-header-tools {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 12px;
  min-width: 0;
}

.backup-launch {
  width: auto;
  flex: 0 0 auto;
  white-space: nowrap;
}

.main-surface {
  min-width: 0;
  min-height: 0;
  margin: 14px;
  padding: 26px;
  overflow-x: hidden;
  overflow-y: auto;
  overscroll-behavior-y: contain;
  -webkit-overflow-scrolling: touch;
}

.app-footer {
  position: relative;
  z-index: 10;
  margin: 0;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom));
  border-top: 1px solid rgba(93, 112, 146, 0.16);
  color: #6f7a8d;
  background: rgba(255, 255, 255, 0.96);
  box-shadow: 0 -10px 26px rgba(39, 56, 93, 0.08);
  overscroll-behavior: none;
}

.modal-backdrop {
  overscroll-behavior: contain;
}

@media (max-width: 760px) {
  .app-shell {
    width: 100%;
  }

  .app-header {
    padding: calc(9px + env(safe-area-inset-top)) 10px 9px;
  }

  .app-header-tools {
    gap: 7px;
  }

  .backup-launch {
    min-width: 0;
    padding: 9px 10px;
    font-size: 11px;
  }

  .main-surface {
    margin: 8px;
    padding: 15px;
    border-radius: 20px;
  }

  .app-footer {
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
    font-size: 11px;
  }
}

@media (max-width: 460px) {
  .app-header {
    gap: 8px;
  }

  .app-header-tools {
    flex-direction: column;
    align-items: stretch;
  }

  .global-stats {
    align-self: flex-end;
  }

  .backup-launch {
    width: 100%;
  }
}
'''
          Path('src/layout.css').write_text(layout, encoding='utf-8')

          main_path = Path('src/main.js')
          main_text = main_path.read_text(encoding='utf-8')
          if "import './layout.css'" not in main_text:
              main_text = main_text.replace("import './style.css'\n", "import './style.css'\nimport './layout.css'\n", 1)
          main_path.write_text(main_text, encoding='utf-8')

          Path('.github/workflows/apply-pat-test-layout.yml').unlink(missing_ok=True)

          original_verify = '''name: Verify Account Manager

on:
  push:
    branches:
      - 'future/**'
  pull_request:
