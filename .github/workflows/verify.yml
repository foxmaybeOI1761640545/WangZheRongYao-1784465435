        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
'''
          Path('.github/workflows/verify.yml').write_text(original_verify, encoding='utf-8')
          PY

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build

      - name: Commit applied maintenance
        shell: bash
        run: |
          if git diff --quiet; then
            echo 'No source changes to commit.'
            exit 0
          fi
          git config user.name 'foxmaybeOI1761640545'
          git config user.email '240696426+foxmaybeOI1761640545@users.noreply.github.com'
          git add src/components/BackupCenter.vue src/layout.css src/main.js .github/workflows/verify.yml .github/workflows/apply-pat-test-layout.yml
          git commit -m 'feat(backup),ui: 增加 PAT 测试并改为固定三层布局 | Add PAT validation and a fixed three-region layout'
          git push origin HEAD:future/1784534225/AccountManager
